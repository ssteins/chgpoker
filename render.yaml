services:
  # Backend service
  - type: web
    name: pointing-poker-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - fromGroup: pointing-poker-env

  # Frontend service  
  - type: web
    name: pointing-poker-frontend
    env: static
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - fromGroup: pointing-poker-env
    routes:
      - type: redirect
        source: /*
        destination: /index.html

envVarGroups:
  - name: pointing-poker-env
    envVars:
      - key: OKTA_ISSUER
        value: your-okta-domain.okta.com
      - key: OKTA_CLIENT_ID
        value: your-client-id
      - key: OKTA_CLIENT_SECRET
        value: your-client-secret
      - key: JWT_SECRET
        value: your-jwt-secret-min-256-bits
      - key: FRONTEND_URL
        value: https://pointing-poker-frontend.onrender.com
      - key: BACKEND_URL
        value: https://pointing-poker-backend.onrender.com